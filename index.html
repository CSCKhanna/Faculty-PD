<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>URI Faculty Development Training Calendar</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #f8fafc;
        color: #111827;
        font-family: Arial, Helvetica, sans-serif;
      }
      .page {
        margin: 0 auto;
        max-width: 1180px;
        padding: 24px;
      }
      .embed-frame {
        overflow: hidden;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }
      iframe {
        display: block;
        width: 100%;
        height: 860px;
        border: 0;
        background: #fff;
      }
      @media (max-width: 720px) {
        .page { padding: 12px; }
        iframe { height: 760px; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="embed-frame">
        <iframe
          id="desktop"
          width="100%"
          height="860"
          src="https://mghp.osn.xsede.org/emri/faculty-training-webpage/index.html"
          frameborder="0"
          allowfullscreen="true">
        </iframe>
      </div>
    </main>
  </body>
</html>
